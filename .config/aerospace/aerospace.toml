# AeroSpace config — Eduardo's setup
# Docs: https://nikitabobko.github.io/AeroSpace/guide

after-login-command = []
after-startup-command = []
start-at-login = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Move mouse to focused window after switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'dvorak'

# ===========================================================
# Main mode
# ===========================================================
[mode.main.binding]

# Focus (vi-style) — ctrl+opt to avoid terminal conflicts
ctrl-alt-h = 'focus left'
ctrl-alt-j = 'focus down'
ctrl-alt-k = 'focus up'
ctrl-alt-l = 'focus right'

# Move windows
ctrl-alt-shift-h = 'move left'
ctrl-alt-shift-j = 'move down'
ctrl-alt-shift-k = 'move up'
ctrl-alt-shift-l = 'move right'

# Workspace switching
# alt-1 = 'workspace 1'
# alt-2 = 'workspace 2'
# alt-3 = 'workspace 3'
# alt-4 = 'workspace 4'
# alt-5 = 'workspace 5'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Send workspace to the next monitor (wrap around)
# alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Layout toggles
# alt-slash = 'layout tiles horizontal vertical'
# alt-comma = 'layout accordion horizontal vertical'

# AeroSpace fullscreen (not macOS native)
# alt-f = 'fullscreen'

# Close window
# alt-shift-q = 'close'

# Enter resize mode
# ctrl-alt-r = 'mode resize'

# Enter preset mode
ctrl-alt-p = 'mode preset'

# ===========================================================
# Resize mode
# ===========================================================
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# ===========================================================
# Preset mode — quick layout presets
# ===========================================================
[mode.preset.binding]
# d = dev: horizontal tiles (Edge left, Ghostty right)
d = ['layout h_tiles', 'mode main']
# f = focus: fullscreen current window
f = ['fullscreen', 'mode main']
# w = writing: vertical accordion (one window at a time)
w = ['layout v_accordion', 'mode main']
esc = 'mode main'

# ===========================================================
# Workspace → Monitor assignments
# Run `aerospace list-monitors` to see monitor names/IDs
# then update these assignments accordingly.
# External (large) monitor → workspaces 1–3
# MacBook built-in → workspaces 4–5
# ===========================================================
[workspace-to-monitor-force-assignment]
# 1 = DELL U3223QE (external), 2 = Built-in Retina Display
1 = 1
2 = 1
3 = 1
4 = 2
5 = 2

# ===========================================================
# App → Workspace auto-assignment
# Edge left, Ghostty right on workspace 1 (external monitor)
# Open Edge first, then Ghostty — auto-splits to the right.
# ===========================================================
[[on-window-detected]]
if.app-id = 'com.microsoft.edgemac'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

# ===========================================================
# Auto-float small/dialog apps
# ===========================================================
[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Passwords'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.runningwithcrayons.Alfred-Preferences'
run = 'layout floating'
